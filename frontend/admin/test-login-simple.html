<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .demo-accounts {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>教育实践平台 - 登录测试</h1>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">用户名:</label>
            <input type="text" id="username" name="username" value="admin" required>
        </div>
        <div class="form-group">
            <label for="password">密码:</label>
            <input type="password" id="password" name="password" value="admin123" required>
        </div>
        <button type="submit">登录</button>
    </form>

    <div id="result"></div>

    <div class="demo-accounts">
        <h4>演示账号：</h4>
        <p><strong>超级管理员:</strong> admin / admin</p>
        <p><strong>基地管理员:</strong> baseadmin / baseadmin</p>
        <p><strong>学生用户:</strong> student / student</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = '<div class="result">正在登录...</div>';

            try {
                const response = await fetch('http://localhost:3333/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>登录成功！</h3>
                            <p><strong>欢迎:</strong> ${data.user.name}</p>
                            <p><strong>角色:</strong> ${data.user.role}</p>
                            <p><strong>Token:</strong> ${data.token.substring(0, 50)}...</p>
                        </div>
                    `;

                    // 保存token到localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // 3秒后跳转到主应用
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 3000);

                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>登录失败</h3>
                            <p>${data.error}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>网络错误</h3>
                        <p>${error.message}</p>
                        <p>请检查后端服务是否运行在 http://localhost:3333</p>
                    </div>
                `;
                console.error('Login error:', error);
            }
        });
    </script>
</body>
</html>

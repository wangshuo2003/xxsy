
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: 9
      MYSQL_DATABASE: education_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      args:
        PRISMA_ENGINES_MIRROR: "https://registry.npmmirror.com/-/binary/prisma"
    ports:
      - "28964:28964"
    depends_on:
      - mysql
    environment:
      DATABASE_URL: "mysql://root:9@mysql:3306/education_platform"
      JWT_SECRET: "your-secret-key"
      NODE_ENV: development
      PORT: 28964
      RATE_LIMIT_ENABLED: "false"
      FILE_PUBLIC_BASE_URL: "http://localhost:28964"
    volumes:
      - ./backend/uploads:/app/uploads

  admin-frontend:
    build:
      context: ./frontend/admin
      args:
        VITE_API_BASE_URL: http://localhost:28964/api
    ports:
      - "18964:18964"
    depends_on:
      - backend

  user-frontend:
    build:
      context: ./frontend/user
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "8964:8964"
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:28964

volumes:
  mysql_data:
    external: true
    name: xxsy_mysql_data
